services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['sh', '-c', 'npm install && npm run start']
    env_file:
      - .env
    ports:
      - '${PORT}:3000'
    volumes:
      - .:/usr/src/app
      - dev_node_modules:/usr/src/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - '${MONGODB_PORT}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          'mongodb://localhost:27017/${MONGO_INITDB_DATABASE}',
          '--eval',
          'db.runCommand({ ping: 1 })',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:2024.2
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
    ports:
      - '${SEQ_HTTP_PORT}:80'
      - '${SEQ_INGEST_PORT}:5341'

volumes:
  mongo-data:
  redis-data:
  dev_node_modules:
