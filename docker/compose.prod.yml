services:
  # MongoDB disabled - using remote MongoDB Atlas
  mongodb:
    profiles:
      - disabled

  # MongoDB exporter disabled - not needed without local MongoDB
  mongodb-exporter:
    profiles:
      - disabled

  # Prometheus depends on Redis exporter, but since we're using a remote MongoDB, we can skip the MongoDB exporter dependency
  prometheus:
    depends_on: !override
      redis-exporter:
        condition: service_started

  api:
    image: nestjs-boilerplate:prod
    build:
      context: ..
      dockerfile: docker/images/api/Dockerfile.prod
    command: ['sh', '-c', 'npm install && npm run start:prod']
    env_file:
      - ./env/.env.prod
    ports:
      - '${PORT}:3000'
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped
