services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - '${MONGODB_PORT}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          'mongodb://localhost:27017/${MONGO_INITDB_DATABASE}',
          '--eval',
          'db.runCommand({ ping: 1 })',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:2024.2
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
    ports:
      - '${SEQ_HTTP_PORT}:80'
      - '${SEQ_INGEST_PORT}:5341'

  redis-exporter:
    image: oliver006/redis_exporter:v1.57.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - '${REDIS_EXPORTER_PORT}:9121'
    depends_on:
      redis:
        condition: service_healthy

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    restart: unless-stopped
    command:
      - '--mongodb.uri=mongodb://mongodb:27017'
    ports:
      - '${MONGODB_EXPORTER_PORT}:9216'
    depends_on:
      mongodb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS}d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_PORT}:9090'
    depends_on:
      redis-exporter:
        condition: service_started
      mongodb-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_AUTH_ANON}
      GF_AUTH_ANONYMOUS_ORG_ROLE: ${GRAFANA_AUTH_ANON_ROLE}
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL}
    ports:
      - '${GRAFANA_PORT}:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mongo-data:
  redis-data:
  grafana-data:
  prometheus-data:
